name: Blob Size Policy

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: blob-size-policy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-blob-sizes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for large files in PR
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }}...HEAD)
          MAX_SIZE=${BLOB_SIZE_LIMIT:-1048576}
          FAILED=0
          if [ -z "$FILES" ]; then
            echo "No files to check."
            exit 0
          fi
          for FILE in $FILES; do
            if [ ! -f "$FILE" ]; then
              continue
            fi
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt "$MAX_SIZE" ]; then
              echo "::error file=$FILE::File exceeds size limit ($SIZE > $MAX_SIZE bytes)."
              FAILED=1
            else
              echo "OK: $FILE ($SIZE bytes)"
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "Some files exceed the $MAX_SIZE byte size limit."
            exit 1
          fi
