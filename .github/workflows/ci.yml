name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Pike 8.0
        run: |
          sudo apt-get update
          sudo apt-get install -y pike8.0

      - name: Verify Pike
        run: pike --version

      - name: Install pmp
        run: git clone https://github.com/TheSmuks/pmp.git /tmp/pmp

      - name: Install dependencies
        run: pike /tmp/pmp/bin/pmp.pike install

      - name: Run tests
        run: pike /tmp/pmp/bin/pmp.pike run run_tests.pike tests/