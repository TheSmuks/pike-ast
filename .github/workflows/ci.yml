name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Pike 8.0
        run: |
          sudo apt-get update
          sudo apt-get install -y pike8.0

      - name: Verify Pike
        run: pike --version

      - name: Install PUnit
        run: |
          git clone --depth 1 --branch v1.0.0 https://github.com/TheSmuks/punit-tests.git /tmp/punit
          mkdir -p modules
          ln -s /tmp/punit/PUnit.pmod modules/PUnit.pmod

      - name: Link PikeAst module
        run: |
          mkdir -p modules
          ln -s "$(pwd)/PikeAst.pmod" modules/PikeAst.pmod

      - name: Run tests
        env:
          PIKE_MODULE_PATH: modules
        run: pike run_tests.pike tests/